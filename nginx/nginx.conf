
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';

    # Rate-limit rejection log (separate file for security analysis).
    log_format rate_limit '$remote_addr [$time_local] "$request" '
                          '$status "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens       off;          # hide Nginx version
    client_max_body_size 50M;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript
        application/xml+rss application/atom+xml
        image/svg+xml font/woff2;

    limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=auth:10m   rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=iclock:10m rate=10r/s;
    limit_req_zone  $binary_remote_addr zone=media:10m  rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=docs:10m   rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Return 429 (RFC 6585) instead of 503 for rate-limited requests.
    # This allows clients to distinguish "service down" from "slow down".
    limit_req_status  429;
    limit_conn_status 429;

    # Log rate-limited requests at WARN level (visible in error.log for analysis).
    limit_req_log_level warn;

    # ── Bad User-Agent Blocking ───────────────────────────────────────────────
    # Block known vulnerability scanners and credential-stuffing bots.
    # These run BEFORE any location block — rejected at the http layer.
    map $http_user_agent $blocked_ua {
        default            0;
        ""                 1;   # empty UA — bots / scanners
        "~*masscan"        1;
        "~*nmap"           1;
        "~*nikto"          1;
        "~*sqlmap"         1;
        "~*dirbuster"      1;
        "~*gobuster"       1;
        "~*wfuzz"          1;
        "~*hydra"          1;
        "~*zgrab"          1;
        "~*python-requests/2\.[0-3]"  1;   # very old requests versions used by scripts
    }

    # ── Upstream: Django/Gunicorn ─────────────────────────────────────────────
    upstream django_backend {
        server backend:8000;
        keepalive 32;
    }

    # Include per-server config generated from template at startup.
    include /etc/nginx/conf.d/*.conf;
}
