version: "3.9"

# ── Shared defaults via YAML anchors ─────────────────────────────────────────
x-log-rotation: &log-rotation
  driver: "json-file"
  options:
    max-size: "10m" # rotate at 10 MB
    max-file: "5" # keep 5 rotated files → max 50 MB per service

x-django-base: &django-base
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  env_file:
    - .env
  restart: unless-stopped
  logging: *log-rotation
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *log-rotation
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend_net

  # ──────────────────────────────────────────────────────────────────────────
  # Redis  (Celery broker on DB 0, Django cache on DB 1)
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *log-rotation
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend_net

  # ──────────────────────────────────────────────────────────────────────────
  # Django (Gunicorn)
  # Runs: migrate → collectstatic → gunicorn (see scripts/entrypoint.sh)
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    <<: *django-base
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
      - app_logs:/app/logs
    expose:
      - "8000"
    networks:
      - backend_net
      - frontend_net
    healthcheck:
      # Uses Python (always available) — no curl in python:3.12-slim.
      # Hits the /health/ endpoint which verifies DB + Redis connectivity.
      # start_period covers the time for migrate + collectstatic to run.
      test:
        - "CMD-SHELL"
        - |
          python -c "
          import urllib.request, sys
          try:
              r = urllib.request.urlopen('http://localhost:8000/health/', timeout=5)
              sys.exit(0 if r.status == 200 else 1)
          except Exception:
              sys.exit(1)
          "
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s # migrate + collectstatic can take up to 90s on first run
    # If pyzk code PULLS from LAN biometric devices, add device IPs here:
    # extra_hosts:
    #   - "biometric-device-1:192.168.1.200"

  # ──────────────────────────────────────────────────────────────────────────
  # Celery Worker
  # Handles: biometric sync, PDF generation, email, attendance processing
  # ──────────────────────────────────────────────────────────────────────────
  celery_worker:
    <<: *django-base
    command: >
      celery -A kasms worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=500
    volumes:
      - media_files:/app/media
      - app_logs:/app/logs
    networks:
      - backend_net
    healthcheck:
      # Verifies the broker (Redis) is reachable from inside the worker container.
      # If Redis is unreachable the worker cannot receive tasks — it is effectively down.
      test:
        - "CMD-SHELL"
        - |
          python -c "
          import redis, os, sys
          try:
              url = os.environ.get('CELERY_BROKER_URL', 'redis://redis:6379/0')
              r = redis.Redis.from_url(url, socket_connect_timeout=3)
              r.ping()
              sys.exit(0)
          except Exception:
              sys.exit(1)
          "
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────────────────────────────────
  # Celery Beat (periodic task scheduler)
  # Uses DatabaseScheduler so schedules survive container restarts.
  # WARNING: Run exactly ONE instance. Two instances = duplicate tasks.
  # ──────────────────────────────────────────────────────────────────────────
  celery_beat:
    <<: *django-base
    # --pidfile lets the healthcheck verify the beat process is alive.
    command: >
      celery -A kasms beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --pidfile=/tmp/celerybeat.pid
    volumes:
      - app_logs:/app/logs
    networks:
      - backend_net
    healthcheck:
      # Checks the PID file exists AND the process it refers to is alive.
      # kill -0 sends no signal — it only checks process existence/permissions.
      test:
        - "CMD-SHELL"
        - |
          test -f /tmp/celerybeat.pid &&
          kill -0 "$(cat /tmp/celerybeat.pid)" 2>/dev/null ||
          exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────────────────────────────────
  # Nginx (Reverse Proxy + React SPA)
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_APP_NAME: ${VITE_APP_NAME:-KASMS}
    restart: unless-stopped
    logging: *log-rotation
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy # only start after Django is healthy
    networks:
      - frontend_net
    healthcheck:
      # /nginx-health is served directly by Nginx (no proxy to Django).
      # wget is available in nginx:1.25-alpine. This confirms Nginx is
      # running and accepting connections even if Django is down.
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost/nginx-health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────────────────────────────────
  # Certbot – Let's Encrypt SSL auto-renewal
  # ──────────────────────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    logging: *log-rotation
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_files:
    driver: local
  static_files:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  backend_net:
    driver: bridge
    internal: true
  frontend_net:
    driver: bridge
