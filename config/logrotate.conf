# =============================================================================
# logrotate configuration – KASMS file-based logs
#
# Scope: Python/Django log files written inside the Docker volume (app_logs).
#        Docker container stdout/stderr is handled separately by Docker's
#        json-file driver (max-size + max-file in docker-compose.yml).
#
# INSTALL on the host:
#   sudo cp config/logrotate.conf /etc/logrotate.d/kasms
#   sudo logrotate --debug /etc/logrotate.d/kasms   # dry-run test
#
# The actual log file path depends on where Docker mounts the app_logs volume.
# Find it with:
#   docker volume inspect kasms_app_logs --format '{{.Mountpoint}}'
# Typically: /var/lib/docker/volumes/kasms_app_logs/_data
#
# Replace DOCKER_VOLUME_PATH below with the actual path after running the above.
# =============================================================================

/var/lib/docker/volumes/kasms_app_logs/_data/*.log {
    # Rotate when the file exceeds 20 MB.
    size 20M

    # Keep 10 rotated files (→ max 200 MB total per log file).
    rotate 10

    # Compress rotated files to save disk space.
    compress
    delaycompress   # compress the previous rotation on next run (safer)

    # Do not error if the log file is missing (e.g., first run).
    missingok

    # Do not rotate if the file is empty.
    notifempty

    # Add a date suffix (e.g., certificate_verification.log.2026-04-23).
    dateext
    dateformat -%Y-%m-%d

    # Copy-and-truncate: safe for processes that keep the file open (Django
    # RotatingFileHandler already handles its own rotation, so logrotate is
    # a safety net for any logs that bypass Python's handler).
    copytruncate

    # Shared script runs once even if multiple logs are rotated.
    sharedscripts

    postrotate
        # Signal Django to re-open log files after rotation.
        # Gunicorn workers support SIGUSR2 for graceful log reopen.
        docker compose -f /path/to/KASMS/docker-compose.yml \
            kill -s USR1 backend 2>/dev/null || true
    endscript
}

# Nginx logs are stored in the nginx_logs volume and rotated by Nginx itself.
# To trigger Nginx log rotation manually:
#   docker compose exec nginx nginx -s reopen
#
# The nginx_logs volume path:
/var/lib/docker/volumes/kasms_nginx_logs/_data/*.log {
    size 50M
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    dateext
    dateformat -%Y-%m-%d
    copytruncate
    sharedscripts
    postrotate
        docker compose -f /path/to/KASMS/docker-compose.yml \
            exec -T nginx nginx -s reopen 2>/dev/null || true
    endscript
}
